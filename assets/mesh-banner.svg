<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="MESH — Token-Efficient, Graph-Native Logic for Repository-Scale Code Agents">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#090c11"/>
      <stop offset="1" stop-color="#0d141b"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#0891b2"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.80" cy="0.32" r="0.55">
      <stop offset="0" stop-color="#06b6d4" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="320" rx="10" fill="url(#bg)"/>
  <rect width="1200" height="320" rx="10" fill="url(#glow)"/>

  <!-- repository-intelligence-graph motif -->
  <g stroke="#22d3ee" stroke-opacity="0.30" stroke-width="1.3">
    <line x1="880" y1="95"  x2="1000" y2="72"/>
    <line x1="1000" y1="72" x2="1075" y2="80"/>
    <line x1="1075" y1="80" x2="1110" y2="120"/>
    <line x1="880" y1="95"  x2="905" y2="165"/>
    <line x1="905" y1="165" x2="1025" y2="195"/>
    <line x1="1000" y1="72" x2="1025" y2="195"/>
    <line x1="1025" y1="195" x2="1130" y2="225"/>
    <line x1="1110" y1="120" x2="1130" y2="225"/>
    <line x1="905" y1="165" x2="960" y2="245"/>
    <line x1="1025" y1="195" x2="960" y2="245"/>
    <line x1="1000" y1="72"  x2="905" y2="165"/>
  </g>
  <g fill="#0d141b" stroke="#22d3ee" stroke-opacity="0.7" stroke-width="1.4">
    <circle cx="1000" cy="72" r="5.5"/>
    <circle cx="1075" cy="80" r="5.5"/>
    <circle cx="1110" cy="120" r="5.5"/>
    <circle cx="1130" cy="225" r="5.5"/>
    <circle cx="960" cy="245" r="5.5"/>
  </g>
  <g fill="#22d3ee">
    <circle cx="880" cy="95" r="8.5"/>
    <circle cx="1025" cy="195" r="8.5"/>
    <circle cx="905" cy="165" r="6.5" fill-opacity="0.92"/>
  </g>

  <!-- wordmark -->
  <text x="92" y="104" font-family="'SFMono-Regular',Menlo,Consolas,monospace" font-size="30" fill="#22d3ee" letter-spacing="2">&lt;/&gt;</text>
  <text x="86" y="216" font-family="Helvetica,Arial,sans-serif" font-weight="800" font-size="122" fill="#f4f6f8" letter-spacing="10">MESH</text>
  <rect x="94" y="236" width="312" height="5" rx="2.5" fill="url(#cyan)"/>
  <text x="97" y="276" font-family="Helvetica,Arial,sans-serif" font-weight="600" font-size="18.5" fill="#8ea3b0" letter-spacing="3.5">TOKEN-EFFICIENT · GRAPH-NATIVE · REPOSITORY-SCALE</text>
</svg>
